  <script>
    const questions = [
      {q: "Which mechanism of filtration uses filters with pores smaller than the particles to be removed?", options:["Impingement","Straining / Sieving","Attractive forces"," Autofiltration","Adsorption",], a:"Straining / Sieving"},

      {q: "Which of the following is a common method of size reduction that uses impact forces principle, attrition and uses a rotating hammers?", options: ["Ball mill", "Hammer mill", "Roller mill", "Fluid energy mill","Colloid mill"], a: "Hammer mill"},

      {q: "Which device uses centrifugal force in gas stream to separate particles from the air ?", options: ["Sieve shaker", "Air separator", "Cyclone sparator", "Bag filter","Filter press"], a: "Cyclone separator"},
      {q: "Which filter medium is commonly used in bacteria filtration of parental solutions?", options: ["Membrane filter", "Filter paper", "Cotton wool", "Muslin cloth","Glass wool"], a: "Membrane filter"},
      {q: "Which filttration equipment is simple , inexpensive , and limited to low operating pressures?", options: ["Pressure filter", "Vacuum filter", "Meta filter", "Gravity filter","Rotary filter"], a: "Gravity filter"},
      {q: "Which is disadvantage of the hammer mill?", options: ["High reduction ratio", "Suitable for fibrous materials", "Generates heat", "Easy to clean","Versatile use"], a: "Generates heat"},
      {q: "Which type of distillation is best for separating components with close boiling points?", options: ["Simple distillation", "Fractional distillation", "Steam distillation", "Vacuum distillation","Molecular distillation"], a: "Fractional distillation"},
      {q: "Which distillation method is used for heat-sensitive compounds by reducing the boiling point through low pressure?", options: ["Simple distillation", "Fractional distillation", "Steam distillation", "Vacuum distillation","Molecular distillation"], a: "Vacuum distillation"},
      {q: "Which distillation technique is used for separating high boiling point compounds by operating at very low pressures?", options: ["Simple distillation", "Fractional distillation", "Steam distillation", "Vacuum distillation","Molecular distillation"], a: "Molecular distillation"},
      {q: "Which distillation method is used for separating immiscible liquids by utilizing their different boiling points?", options: ["Simple distillation", "Fractional distillation", "Steam distillation", "Vacuum distillation","Molecular distillation"], a: "Steam distillation"},
      {q: "Which distillation method is suitable for purifying a liquid by removing non-volatile impurities?", options: ["Simple distillation", "Fractional distillation", "Steam distillation", "Vacuum distillation","Molecular distillation"], a: "Simple distillation"},
      {q: "Which factor must be consiered wgen selecting filtration equipment to prevent problems such as leaching or adsorption?", options: ["Chemical nature of the product", "Operating pressure only", "Cake thickness", "Filter colour","Volume only"], a: "Chemical nature of the product"},

      {q: "In multiple stage extraction, different solvents are used to:", options: ["Pressure and temperature management","Solvent evaporation speed","Size of the filter used","Storage conditions of the final product",], a: "Pressure and temperature management"},

  {q: "Which type of material is generally preferred for the construction of pharmaceutical plants due to its mechanical strength and low cost?", options: ["Aluminium","Cast iron","Stainless steel","Glass"], a: "Stainless steel"},

  {q: "Why is thermal conductivity an important factor in selecting materials for equipment like stills and evaporators?", options: ["To prevent corrosion.","To ensure efficient heat transfer.","To facilitate easy cleaning.","To provide transparency."], a: "To ensure efficient heat transfer."},

  {q: "Which of the following is NOT typically removed during the filtration?", options: ["Undissolved drug particles","Microbial contaminants","Soluble drug molecules","Particulate matter"], a: "Soluble drug molecules"},

  {q: "What is the residue left in the distillation flask typically composed of?", options: ["Volatile substances","Non-volatile impurities","Both volatile and non-volatile substances","None of the above"], a: "Non-volatile impurities"},

  {q: "Regarding evaporation, which one of the following statements is incorrect?", options: ["Evaporation occurs at any temperature","Evaporation takes place within liquid","Temperature may change during evaporation","No bubbles are formed in liquid during evaporation"], a: "Evaporation takes place within liquid"},
  {q: "Which of the following is considered a non-thermal method of drying as described in the notes?", options: ["Increasing the inlet air temperature.","Introducing a high-temperature radiating heat source.","Adsorption of water from a solvent by the use of desiccants.","Reducing the thickness of the material being dried."], a: "Adsorption of water from a solvent by the use of desiccants."},
  {q: "How can the rate of convective heat transfer (Qc) during drying be increased?", options: ["By reducing the thickness of the material.","By increasing the air flow rate.","By introducing a high-temperature radiating heat source.","By increasing the humidity of the inlet air."], a: "By increasing the air flow rate."},
  {q: "In the typical drying curve, what happens to the drying rate during the 'constant rate period'?", options: ["The drying rate steadily decreases.","The drying rate remains constant as unbound water is removed.","The material reaches its equilibrium moisture content.","The temperature of the material rapidly increases."], a: "The drying rate remains constant as unbound water is removed."},
  {q: "What term is used for the moisture content present in a solid under steady-state ambient conditions, which cannot be easily removed by simple evaporative processes?", options: ["Total moisture content.","Free moisture content.","Unbound water.","Equilibrium moisture content"], a: "Equilibrium moisture content"},
  {q: "Moisture described as 'bound' in a wet solid is typically characterized by which of the following?", options: ["It exists freely as a liquid and is easily removed by evaporation.","It is adsorbed on surfaces or trapped within the solid structure, making it difficult to remove.","It forms a separate, immiscible layer on the solid's surface.","It only appears after the material has reached its air-dry state."], a: "It is adsorbed on surfaces or trapped within the solid structure, making it difficult to remove."},
  {q: "In convective drying, why might the relative humidity of the air rise during the drying process?", options: ["Due to the uptake of evaporated water vapor from the wet solid.","Due to a decrease in the initial moisture content of the solid.","Due to an increase in the temperature of the supply air.","Due to a decrease in the overall air flow rate."], a: "Due to the uptake of evaporated water vapor from the wet solid."},
  {q: "Which type of pharmaceutical dryer is characterized by solid particles being partially suspended in an upward-moving gas stream, acting like a boiling liquid?", options: ["Static-bed Dryers.","Moving-bed Dryers.","Fluidized-bed Dryers.","Pneumatic Dryers."], a: "Fluidized-bed Dryers."},

  {q: "What is the fundamental principle upon which freeze drying (lyophilization) depends?", options: ["Sublimation, where water passes directly from solid (ice) to vapor.","Boiling of the solution at elevated temperatures.","Evaporation of water from liquid to vapor phase.","Condensation of water vapor into liquid."], a: "Sublimation, where water passes directly from solid (ice) to vapor."},
